<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Page Cover</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family: 'Inter', sans-serif;
      height:100vh;
      overflow:hidden;
      margin:0;
    }

    /* Animation */
    @keyframes fade-in{
      0%{opacity:0; transform:translateY(20px);}
      100%{opacity:1; transform:translateY(0);}
    }

    .animate-fade-in{
      animation:fade-in 1.5s ease-out forwards;
    }

    #cover-image{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
    }

    .cover-text{
      background:rgba(0,0,0,0.5);
      color:white;
      padding:2rem;
      border-radius:12px;
      max-width:600px;
      font-size:1.8rem;
      font-weight:600;
      text-align:center;
    }

    .footer-text{
      background:rgba(0,0,0,0.4);
      color:white;
      padding:8px 20px;
      border-radius:10px;
      text-align:center;
    }

    .logo{
      position:fixed;
      bottom:15px;
      right:15px;
      z-index:10;
    }
  </style>
</head>

<body>

  <!-- Image de fond -->
  <img id="cover-image" src="" alt="cover">

  <!-- Texte principal -->
  <div class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center p-3">
    <div id="cover-text" class="cover-text animate-fade-in">
      Erreur de chargement.
    </div>
  </div>

  <!-- Footer -->
  <div class="position-absolute bottom-0 start-50 translate-middle-x mb-3">
    <div class="footer-text">
      <a href="../CentreDeMiracle/index.html" class="text-white text-decoration-none">
        EERI Centre de Miracles <br>
        01 23 45 67 89
      </a>
    </div>
  </div>

  <!-- Logo -->
  <div class="logo">
    <a href="../CentreDeMiracle/index.html">
      <img src="images/logo.png" class="img-fluid" style="max-width:120px;">
    </a>
  </div>

  <!-- Script -->
  <script>
    const totalImages = 10;
    const imageNumber = Math.floor(Math.random() * totalImages) + 1;
    document.getElementById('cover-image').src = `images/img${imageNumber}.jpg`;

    const exhortations = [
      "Rien n’est impossible à Dieu.",
      "Dieu pourvoit à tous tes besoins.",
      "Marche par la foi, non par la vue.",
      "Le Seigneur est ton berger.",
      "Sois fort et courageux.",
      "La paix de Dieu garde ton cœur.",
      "Il renouvelle tes forces chaque matin.",
      "Tu es plus que vainqueur en Christ.",
      "Cherche premièrement le royaume de Dieu.",
      "Dieu t’aime d’un amour éternel."
    ];

    const randomText = exhortations[Math.floor(Math.random() * exhortations.length)];
    document.getElementById("cover-text").textContent = randomText;
  </script>

</body>
</html>
